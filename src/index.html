<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora básica</h1>
    <main form action="" class="calculadora">
        <label for="operation">Tipo de calculo</label>
        <select id="operation">
            <option value="" disabled selected>Selecione uma operação</option>
            <option value="sum">Adição</option>
            <option value="subtract">Subtração</option>
            <option value="multiply">Multiplicação</option>
            <option value="divide">Divisão</option>
        </select>

        <label for="num1">Digite um número:</label>
        <input type="number" id="num1">

        <label for="num2">Digite outro número:</label>
        <input type="number" id="num2">

        <button type="button" id="btn">Calcular</button>
    </main>

    <h2>Resultado:</h2>
    <p id="result"></p>

    <script type="module" src="./calculator.js"></script>
</body>
</html>
